const { useState, useRef, useEffect } = React;

const BUILDER_STATE_KEY = 'overlayElementBuilderStateV2';
const BUILDER_ASSET_LIBRARY_KEY = 'twitchOverlayBuilderAssetsV1';

function builderEscapeHtml(value) {
  return String(value ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
}

function builderSafeSlug(value, fallback = 'overlay_element') {
  return String(value || fallback).trim().replace(/[^a-z0-9_ -]/gi, '').replace(/\s+/g, '_').replace(/_+/g, '_').slice(0, 80) || fallback;
}

function readBuilderAssetLibrary() {
  try { return JSON.parse(localStorage.getItem(BUILDER_ASSET_LIBRARY_KEY) || '[]'); } catch { return []; }
}

function rememberBuilderAsset(asset) {
  try {
    const current = readBuilderAssetLibrary();
    const normalized = {
      id: asset.id || `builder-${Date.now()}-${Math.random().toString(16).slice(2)}`,
      name: asset.name || 'overlay_asset',
      type: asset.type || 'output-html',
      mime: asset.mime || 'text/html',
      dataUrl: asset.dataUrl || '',
      text: asset.text || '',
      w: asset.w || 300,
      h: asset.h || 90,
      createdAt: asset.createdAt || new Date().toISOString()
    };
    const filtered = current.filter(item => item.name !== normalized.name && item.id !== normalized.id);
    filtered.unshift(normalized);
    localStorage.setItem(BUILDER_ASSET_LIBRARY_KEY, JSON.stringify(filtered.slice(0, 80)));
    document.cookie = `twitchOverlayLastExport=${encodeURIComponent(normalized.name)}; path=/; max-age=31536000; SameSite=Lax`;
    window.dispatchEvent(new CustomEvent('twitch-overlay-builder-asset-exported', { detail: normalized }));
  } catch (err) {
    console.warn('Could not cache builder export', err);
  }
}

function loadImageDataUrl(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

            ctx.lineTo(bx + bw - cut, by + bh);
            ctx.lineTo(bx + cut, by + bh);
            ctx.lineTo(bx, by + bh - cut);
            ctx.lineTo(bx, by + cut);
          } else {
            ctx.roundRect ? ctx.roundRect(bx, by, bw, bh, cornerRadius) : ctx.rect(bx, by, bw, bh);
          }
          ctx.closePath();
        };

        // Draw Left/Right Icon Plate backplate if enabled. Custom PNG-only labels can hide this plate.
        const drawIconPlate = !(currentIcon === 'custom' && !showCustomIconPlate);
        if (iconPosition === 'left' && drawIconPlate) {
          drawChamferBox(leftX, pad, iconW, buttonH, chamfer);
          ctx.fillStyle = primaryColor;
          ctx.fill();
          if (borderWidth > 0) {
            ctx.strokeStyle = borderColor;
            ctx.lineWidth = borderWidth;
            ctx.stroke();
          }
        } else if (iconPosition === 'right' && drawIconPlate) {
          const rx = pad + mainW + gap;
          drawChamferBox(rx, pad, iconW, buttonH, chamfer);
          ctx.fillStyle = primaryColor;
          ctx.fill();
          if (borderWidth > 0) {
            ctx.strokeStyle = borderColor;
            ctx.lineWidth = borderWidth;
            ctx.stroke();
          }
        }

        // Draw Main Text Backplate
        drawChamferBox(rightX, pad, mainW, buttonH, chamfer);
        ctx.fillStyle = secondaryColor;
        ctx.fill();

          ctx.lineWidth = borderWidth;
          ctx.stroke();

        // Shut off shadows for internal textures
        ctx.shadowBlur = 0;

        // Draw HUD wireframe grid scanlines
        if (cardStyle === 'hud-wire') {
          ctx.save();
          drawChamferBox(rightX, pad, mainW, buttonH, chamfer);
          ctx.clip();
          ctx.strokeStyle = primaryColor;
          ctx.globalAlpha = 0.12;
          ctx.lineWidth = 1.5;
          for (let row = pad; row < pad + buttonH; row += 4) {
            ctx.beginPath(); ctx.moveTo(rightX, row); ctx.lineTo(rightX + mainW, row); ctx.stroke();
          }
          ctx.restore();
        }

        // Space Stars cosmic texture
        if (cardStyle === 'space-stars') {
          ctx.save();
          drawChamferBox(rightX, pad, mainW, buttonH, chamfer);

          ctx.globalAlpha = 0.8;
          ctx.beginPath(); ctx.arc(rightX + 45, pad + 15, 1.2, 0, Math.PI * 2); ctx.fill();

          ctx.beginPath(); ctx.arc(rightX + 270, pad + 20, 1.0, 0, Math.PI * 2); ctx.fill();

        // Rust Texture grunge noise
        if (cardStyle === 'rust-texture') {

          ctx.fillStyle = accentColor;
          ctx.fillRect(rightX + 2, pad + 6, 4, buttonH - 12);

          ctx.fillStyle = accentColor;
          ctx.globalAlpha = 0.7;
          ctx.fillRect(rightX + mainW - 30, pad + 10, 20, 2);
          ctx.fillRect(rightX + mainW - 25, pad + 14, 15, 2);
          ctx.fillRect(rightX + mainW - 20, pad + 18, 10, 2);
          ctx.globalAlpha = 1.0;
        }

        // Mechanical top bar
        if (hasTopBar) {
          ctx.fillStyle = borderColor;
          ctx.fillRect(rightX + mainW * 0.3, pad, mainW * 0.4, 4);

          ctx.fillRect(rightX + mainW * 0.45, pad, 15, 4);

            ctx.beginPath(); ctx.arc(leftX + iconW - 8, pad + buttonH - 8, 1.5, 0, Math.PI * 2); ctx.fill();
          } else if (iconPosition === 'right' && drawIconPlate) {
            const rx = pad + mainW + gap;
            ctx.beginPath(); ctx.arc(rx + 8, pad + 8, 1.5, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(rx + iconW - 8, pad + buttonH - 8, 1.5, 0, Math.PI * 2); ctx.fill();

          if (currentIcon === 'custom' && customIconDataUrl) {
            const img = await loadImageDataUrl(customIconDataUrl);
            const desired = 28 * Number(customIconScale || 1);
            const maxSize = showCustomIconPlate ? 96 : 160;
            const size = Math.max(8, Math.min(maxSize, desired));
            const cx = transX + iconW / 2;

        ctx.lineWidth = borderWidth;
        ctx.strokeRect(plateX, plateY, 150, 30);

      console.error(e);
      if (!options.silent) setExportMessage('PNG rasterization failed. Check the custom PNG source and try again.');
      return null;

                        <div style={{ transform: `skewX(${-skew}deg)` }} className="animate-pulse">
                          {currentIcon === 'custom' && customIconDataUrl ? (
                            <img src={customIconDataUrl} alt="Custom icon" className="object-contain" style={{ width: `${28 * customIconScale}px`, height: `${28 * customIconScale}px`, maxWidth: showCustomIconPlate ? '96px' : '160px', maxHeight: showCustomIconPlate ? '96px' : '160px' }} />
                          ) : ICONS[currentIcon].svg}
                        </div>
                        {hasDots && (
                          <>
                            <span className="absolute top-1 left-1 w-1.5 h-1.5 rounded-full animate-ping" style={{ backgroundColor: accentColor }} />
                            <span className="absolute bottom-1 right-1 w-1 h-1 rounded-full" style={{ backgroundColor: accentColor }} />
                          </>
                        )}
                      </div>
                    )}

                    {/* Main Text Content */}
                    <div 
                      className="min-w-[240px] md:min-w-[320px] h-14 relative flex flex-col justify-center px-6 border overflow-hidden"
                      style={{
                        backgroundColor: secondaryColor,
                        borderColor: borderColor,
                        borderWidth: `${borderWidth}px`,
                        clipPath: getClipPath(),
                        borderRadius: chamfer === 0 ? `${cornerRadius}px` : '0px'
                      }}
                    >
                      {/* Textured overlays */}
                      {cardStyle === 'rust-texture' && (
                        <div className="absolute inset-0 pointer-events-none opacity-30" 
                             style={{ backgroundImage: `radial-gradient(${primaryColor} 0.5px, transparent 0.5px)`, backgroundSize: '10px 10px' }} />
                      )}
                      {cardStyle === 'space-stars' && (
                        <div className="absolute inset-0 pointer-events-none opacity-45 bg-[radial-gradient(circle_at_bottom,rgba(255,0,200,0.15),transparent_60%)]">
                          <div className="absolute w-1 h-1 bg-white rounded-full top-3 left-8 animate-ping" />
                          <div className="absolute w-1.5 h-1.5 bg-cyan-400 rounded-full bottom-2 right-12 animate-pulse" />
                        </div>
                      )}
                      {cardStyle === 'hud-wire' && (
                        <div className="absolute inset-0 pointer-events-none opacity-20" 
                             style={{ backgroundImage: `repeating-linear-gradient(0deg, transparent, transparent 2px, ${primaryColor} 2px, ${primaryColor} 4px)` }} />
                      )}
                      {cardStyle === 'scanline-field' && (
                        <div className="absolute inset-0 pointer-events-none opacity-25" 
                             style={{ backgroundImage: `repeating-linear-gradient(0deg, transparent 0px, transparent ${Math.max(1, scanlineSpacing - scanlineThickness)}px, ${primaryColor} ${Math.max(1, scanlineSpacing - scanlineThickness)}px, ${primaryColor} ${Math.max(2, scanlineSpacing)}px)` }} />
                      )}

                      {/* Accent stripes */}
                      {stripeStyle === 'cyber' && (
                        <div className="absolute bottom-0 left-0 right-0 h-1" style={{ backgroundColor: primaryColor }} />
                      )}
                      {stripeStyle === 'rust' && (
                        <div className="absolute left-0 top-0 bottom-0 w-1.5" style={{ backgroundColor: accentColor }} />
                      )}
                      {stripeStyle === 'lines' && (
                        <div className="absolute top-1 right-1 flex flex-col gap-0.5 opacity-60">
                          <div className="w-6 h-0.5" style={{ backgroundColor: accentColor }} />
                          <div className="w-4 h-0.5" style={{ backgroundColor: accentColor }} />
                        </div>
                      )}

                      {(hasScanlines || effectSweep || effectPulse || effectGlitch) && (
                        <div className="absolute inset-0 overflow-hidden pointer-events-none" style={{ clipPath: getClipPath() }}>
                          {hasScanlines && (
                            <div
                              className="absolute -inset-12"
                              style={{
                                opacity: scanlineOpacity,
                                backgroundImage: `repeating-linear-gradient(0deg, transparent 0px, transparent ${Math.max(1, scanlineSpacing - scanlineThickness)}px, ${accentColor} ${Math.max(1, scanlineSpacing - scanlineThickness)}px, ${accentColor} ${Math.max(2, scanlineSpacing)}px)`,
                                transform: `skewX(${scanlineSkew}deg)`,
                                animation: `scanFlow ${Math.max(0.25, 2 / Math.max(0.1, scanlineSpeed))}s linear infinite ${scanlineDirection === 'up' ? 'reverse' : 'normal'}`
                              }}
                            />
                          )}
                          {effectSweep && (
                            <div className="absolute inset-y-0 w-24 opacity-30 mix-blend-screen" style={{ background: `linear-gradient(100deg, transparent, ${accentColor}88, transparent)`, animation: 'energySweep 1.8s linear infinite' }} />
                          )}
                          {effectPulse && <div className="absolute inset-0 animate-pulse opacity-10" style={{ backgroundColor: primaryColor }} />}
                          {effectGlitch && (
                            <>
                              <div className="absolute left-8 top-3 w-14 h-0.5 opacity-70" style={{ backgroundColor: accentColor }} />
                              <div className="absolute right-10 bottom-4 w-20 h-0.5 opacity-60" style={{ backgroundColor: accentColor }} />
                              <div className="absolute left-1/2 bottom-2 w-10 h-px opacity-60" style={{ backgroundColor: textColor }} />
                            </>
                          )}
                        </div>
                      )}

                      {/* Top plate tab */}
                      {hasTopBar && (
                        <div className="absolute -top-[1px] left-1/4 right-1/4 h-1.5 flex gap-1 justify-center">
                          <div className="w-1/3 h-full" style={{ backgroundColor: borderColor }} />
                          <div className="w-1/12 h-full" style={{ backgroundColor: accentColor }} />
                        </div>
                      )}

                      {/* Inner Text content wrapper to reverse skew correctly */}
                      <div className="relative z-10 flex flex-col" style={{ transform: `skewX(${-skew}deg)` }}>
                        <span className="text-base md:text-xl font-black tracking-widest leading-none" style={{ color: textColor }}>
                          {mainText || 'PANEL TITLE'}
                        </span>
                        {subText && (
                          <span className="text-[9px] md:text-[10px] uppercase font-bold tracking-wider mt-0.5 leading-none" style={{ color: subtextColor }}>
                            {subText}
                          </span>
                        )}
                      </div>

                      {hasDots && (
                        <>
                          <span className="absolute top-1.5 left-1.5 w-1 h-1 rounded-full" style={{ backgroundColor: accentColor }} />
                          <span className="absolute bottom-1.5 right-1.5 w-1 h-1 rounded-full" style={{ backgroundColor: accentColor }} />
                        </>
                      )}
                    </div>

                    {/* Right Icon hexagonal frame option */}
                    {iconPosition === 'right' && (
                      <div 
                        className="w-14 h-14 shrink-0 flex items-center justify-center relative transition-all"
                        style={{
                          backgroundColor: currentIcon === 'custom' && !showCustomIconPlate ? 'transparent' : primaryColor,
                          borderColor: currentIcon === 'custom' && !showCustomIconPlate ? 'transparent' : borderColor,
                          borderWidth: currentIcon === 'custom' && !showCustomIconPlate ? '0px' : `${borderWidth}px`,
                          clipPath: currentIcon === 'custom' && !showCustomIconPlate ? 'none' : getClipPath(),
                          color: textColor,
                          borderRadius: currentIcon === 'custom' && !showCustomIconPlate ? '0px' : (chamfer === 0 ? `${cornerRadius}px` : '0px')
                        }}
                      >
                        <div style={{ transform: `skewX(${-skew}deg)` }}>
                          {currentIcon === 'custom' && customIconDataUrl ? (
                            <img src={customIconDataUrl} alt="Custom icon" className="object-contain" style={{ width: `${28 * customIconScale}px`, height: `${28 * customIconScale}px`, maxWidth: showCustomIconPlate ? '96px' : '160px', maxHeight: showCustomIconPlate ? '96px' : '160px' }} />
                          ) : ICONS[currentIcon].svg}
                        </div>
                        {hasDots && (
                          <>
                            <span className="absolute top-1 left-1 w-1 h-1 rounded-full" style={{ backgroundColor: accentColor }} />
                            <span className="absolute bottom-1 right-1 w-1 h-1 rounded-full" style={{ backgroundColor: accentColor }} />
                          </>
                        )}
                      </div>
                    )}
                  </div>
                )}

                {/* VIEWPORT PREVIEW */}
                {elementMode === 'viewport' && (
                  <div 
                    className="relative border transition-all"
                    style={{
                      width: viewportRatio === '16:9' ? '540px' : viewportRatio === '4:3' ? '440px' : '380px',
                      height: viewportRatio === '16:9' ? '304px' : viewportRatio === '4:3' ? '330px' : '380px',
                      borderColor,
                      borderWidth: `${borderWidth}px`,
                      clipPath: getClipPath(),
                      borderRadius: chamfer === 0 ? `${cornerRadius}px` : '0px',
                      filter: glowStrength > 0 ? `drop-shadow(0 0 ${glowStrength}px ${borderColor}80)` : 'none'
                    }}
                  >
                    <div className="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4" style={{ borderColor: primaryColor }} />
                    <div className="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4" style={{ borderColor: primaryColor }} />
                    <div className="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4" style={{ borderColor: primaryColor }} />
                    <div className="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4" style={{ borderColor: primaryColor }} />

                    {innerGridLines && (
                      <>
                        <div className="absolute left-3 top-1/2 w-5 h-px opacity-40" style={{ backgroundColor: primaryColor }} />
                        <div className="absolute right-3 top-1/2 w-5 h-px opacity-40" style={{ backgroundColor: primaryColor }} />
                        <div className="absolute top-3 left-1/2 h-5 w-px opacity-40" style={{ backgroundColor: primaryColor }} />
                        <div className="absolute bottom-3 left-1/2 h-5 w-px opacity-40" style={{ backgroundColor: primaryColor }} />
                      </>
                    )}

                    {hasTopBar && (
                      <div className="absolute top-0 left-1/2 -translate-x-1/2 w-24 h-4 border flex items-center gap-1 px-2" style={{ backgroundColor: secondaryColor, borderColor }}>
                        <span className="w-1.5 h-1.5 rounded-full" style={{ backgroundColor: accentColor }} />
                        <span className="text-[7px] font-mono tracking-widest text-white">REC FEED</span>
                      </div>
                    )}

                    <div 
                      className={`absolute w-[150px] h-[30px] border flex items-center justify-between px-2 ${
                        tagPosition === 'top-left' ? 'top-4 left-4' : tagPosition === 'bottom-right' ? 'bottom-4 right-4' : 'bottom-4 left-1/2 -translate-x-1/2'
                      }`}
                      style={{ backgroundColor: secondaryColor, borderColor, borderWidth: `${borderWidth}px`, borderRadius: `${cornerRadius}px` }}
                    >
                      <span className="text-xs font-black tracking-wider truncate" style={{ color: textColor }}>{viewportUsername}</span>
                      <span className="text-[8px] font-black px-1.5 py-0.5 rounded-sm" style={{ backgroundColor: primaryColor, color: secondaryColor }}>{viewportStatus}</span>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* Export Controls */}
          <div className="bg-slate-900 border border-slate-800 rounded-xl p-4 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div>
              <p className="text-sm font-bold text-slate-200">Export transparent assets</p>
              <p className="text-xs text-slate-500 font-mono">PNG/HTML export bakes current custom PNG label, plate visibility, scale, scanlines, and typed fields. Frames export as a PNG frameset ZIP.</p>
              <div className="mt-2 flex items-center gap-2 text-[10px] font-mono text-slate-400">
                <label className="flex items-center gap-1">Frames
                  <input type="number" min="2" max="120" value={animationFrames} onChange={(e) => setAnimationFrames(e.target.value)} className="w-14 bg-slate-950 border border-slate-800 rounded px-1 py-0.5 text-slate-200" />
                </label>
                <label className="flex items-center gap-1">FPS
                  <input type="number" min="1" max="60" value={animationFps} onChange={(e) => setAnimationFps(e.target.value)} className="w-14 bg-slate-950 border border-slate-800 rounded px-1 py-0.5 text-slate-200" />
                </label>
              </div>
            </div>
            <div className="flex items-center gap-3">
              {exportMessage && (
                <span className="text-xs font-mono text-emerald-400 animate-pulse">{exportMessage}</span>
              )}
              <button
                onClick={exportAsPng}
                className="px-5 py-2.5 rounded-lg bg-rose-600 hover:bg-rose-500 text-white font-bold text-sm tracking-wider shadow-lg shadow-rose-950/40 transition-all"
              >
                EXPORT STATIC ELEMENT
              </button>
              <button
                onClick={exportFramesAsPngSequence}
                className="px-5 py-2.5 rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-100 border border-slate-700 font-bold text-sm tracking-wider transition-all"
              >
                EXPORT PNG FRAMESET ZIP
              </button>
              <button
                onClick={exportAnimatedElementHtml}
                className="px-5 py-2.5 rounded-lg bg-cyan-700 hover:bg-cyan-600 text-white border border-cyan-500/60 font-bold text-sm tracking-wider transition-all"
              >
                EXPORT SELF-CONTAINED HTML
              </button>
            </div>
          </div>
        </section>
      </main>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
